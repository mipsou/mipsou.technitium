---
requires_ansible: '>=2.15.0'

# Group all collection modules so playbooks can set common arguments
# (typically `session`) once via `module_defaults` instead of repeating
# them on every task:
#
#   module_defaults:
#     group/mipsou.technitium.all:
#       session: "{{ tech.session }}"
action_groups:
  # `session` itself is intentionally excluded: it produces a session dict
  # rather than consuming one, so `module_defaults: group/mipsou.technitium.all`
  # would feed it a parameter it does not accept.
  all:
    - setting
    - blocklist
    - zone
    - record
    - user
    - allowed_zone
    - blocked_zone
