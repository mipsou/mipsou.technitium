---
# Smoke test for mipsou.technitium against a real Technitium DNS Server.
#
# Expects a fresh Technitium container reachable at technitium_host:technitium_port
# (default 127.0.0.1:5380) and the desired admin password in technitium_password.
#
# To run locally:
#   podman run -d --name technitium-test -p 5380:5380 technitium/dns-server:latest
#   ansible-playbook tests/integration/targets/smoke/tasks/main.yml \
#       -e technitium_password=changeme \
#       -e ansible_connection=local

- name: smoke
  hosts: localhost
  gather_facts: false
  vars:
    test_zone: smoketest.local
  tasks:
    # Use the container's default admin/admin credentials directly. The
    # bootstrap+rotation flow is exercised by a dedicated test (see TODO in
    # tests/integration/targets/rotation/) once we've worked out the exact
    # Technitium token-lifetime semantics post-changePassword.
    - name: Baseline login admin/admin via uri (for comparison)
      ansible.builtin.uri:
        url: "http://{{ technitium_host | default('127.0.0.1') }}:{{ technitium_port | default(5380) }}/api/user/login?user=admin&pass=admin&includeInfo=true"
        method: GET
        return_content: true
      register: baseline

    - name: Open a session
      mipsou.technitium.session:
        host: "{{ technitium_host | default('127.0.0.1') }}"
        port: "{{ technitium_port | default(5380) }}"
        user: admin
        password: admin
      register: tech

    - name: Compare baseline token vs module token
      ansible.builtin.debug:
        msg: "baseline={{ baseline.json.token }}  module={{ tech._debug_token }}  equal={{ baseline.json.token == tech._debug_token }}"

    - name: Probe baseline token
      ansible.builtin.uri:
        url: "http://{{ technitium_host | default('127.0.0.1') }}:{{ technitium_port | default(5380) }}/api/zones/list?token={{ baseline.json.token }}"
        method: GET
        return_content: true
      register: probe_baseline
      failed_when: false

    - name: Probe module token
      ansible.builtin.uri:
        url: "http://{{ technitium_host | default('127.0.0.1') }}:{{ technitium_port | default(5380) }}/api/zones/list?token={{ tech._debug_token }}"
        method: GET
        return_content: true
      register: probe_module
      failed_when: false

    - name: Show probe statuses
      ansible.builtin.debug:
        msg: "baseline_probe={{ probe_baseline.json.status }} module_probe={{ probe_module.json.status }}"

    - name: Probe the session token via direct uri (sanity check)
      ansible.builtin.uri:
        url: "http://{{ tech.session.host }}:{{ tech.session.port }}/api/zones/list?token={{ tech.session.token }}"
        method: GET
        return_content: true
      register: probe
      failed_when: probe.json.status != 'ok'

    - name: Create primary zone
      mipsou.technitium.zone:
        session: "{{ tech.session }}"
        name: "{{ test_zone }}"
        type: Primary
        state: present
      register: zone_create
      failed_when: not zone_create.changed

    - name: Re-create zone is idempotent
      mipsou.technitium.zone:
        session: "{{ tech.session }}"
        name: "{{ test_zone }}"
        type: Primary
        state: present
      register: zone_create2
      failed_when: zone_create2.changed | bool

    - name: Add A record
      mipsou.technitium.record:
        session: "{{ tech.session }}"
        zone: "{{ test_zone }}"
        name: "host1.{{ test_zone }}"
        type: A
        ip_address: 10.0.0.1
        ttl: 3600
      register: rec_add
      failed_when: not rec_add.changed

    - name: Re-add same A record is idempotent
      mipsou.technitium.record:
        session: "{{ tech.session }}"
        zone: "{{ test_zone }}"
        name: "host1.{{ test_zone }}"
        type: A
        ip_address: 10.0.0.1
        ttl: 3600
      register: rec_add2
      failed_when: rec_add2.changed | bool

    - name: Add a second A record on the same name (round-robin)
      mipsou.technitium.record:
        session: "{{ tech.session }}"
        zone: "{{ test_zone }}"
        name: "host1.{{ test_zone }}"
        type: A
        ip_address: 10.0.0.2
      register: rec_rr
      failed_when: not rec_rr.changed

    - name: Set DNSSEC validation off
      mipsou.technitium.setting:
        session: "{{ tech.session }}"
        settings:
          dnssecValidation: false
      register: set_off
      failed_when: not set_off.changed

    - name: Re-apply same setting is idempotent
      mipsou.technitium.setting:
        session: "{{ tech.session }}"
        settings:
          dnssecValidation: false
      register: set_off2
      failed_when: set_off2.changed | bool

    - name: Reject domain entry in blockingBypassList
      mipsou.technitium.setting:
        session: "{{ tech.session }}"
        settings:
          blockingBypassList:
            - netflix.com
      register: bypass_bad
      ignore_errors: true
      failed_when: bypass_bad is success

    - name: Delete record
      mipsou.technitium.record:
        session: "{{ tech.session }}"
        zone: "{{ test_zone }}"
        name: "host1.{{ test_zone }}"
        type: A
        ip_address: 10.0.0.1
        state: absent
      register: rec_del
      failed_when: not rec_del.changed

    - name: Delete zone
      mipsou.technitium.zone:
        session: "{{ tech.session }}"
        name: "{{ test_zone }}"
        state: absent
      register: zone_del
      failed_when: not zone_del.changed

    - name: Re-delete zone is idempotent
      mipsou.technitium.zone:
        session: "{{ tech.session }}"
        name: "{{ test_zone }}"
        state: absent
      register: zone_del2
      failed_when: zone_del2.changed | bool
